<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimalist Home</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
      }
      .sidebar {
        background-color: #000000;
        width: 250px;
        height: 100vh;
        color: white;
        padding: 40px 20px;
        box-sizing: border-box;
      }
      .sidebar h1 {
        font-size: 3rem;
        margin: 0 0 30px 0;
        letter-spacing: -1px;
      }
      .nav-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .nav-list li {
        margin-bottom: 15px;
        font-size: 1.8rem;
        font-weight: bold;
        display: flex;
        align-items: center;
      }
      .nav-list li::before {
        content: "•";
        margin-right: 10px;
      }

      .nav-list a {
        color: white;
        text-decoration: none;
        transition: opacity 0.2s;
      }

      .nav-list a:hover {
        opacity: 0.7;
      }

      .main-content {
        flex-grow: 1;
        background-color: #ffffff;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <h1><a href="Home.html" style="color: rgb(255, 255, 255)">Home</a></h1>
      <ul class="nav-list">
        <li><a href="Fruit.html">Fruit</a></li>
        <li><a href="Temple.html">Temple</a></li>
        <li><a href="Steavkhmer.html">Steav khmer</a></li>
      </ul>
    </aside>

    <main class="main-content"></main>

    <div style="border: solid 5px red">
      <img width="500px" src="" alt="" />
    </div>

    <pre></pre>
  </body>
</html>
